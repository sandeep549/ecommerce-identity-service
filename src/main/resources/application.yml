server:
  port: ${PORT:8083}

spring:
  application:
    name: identity-service

supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
